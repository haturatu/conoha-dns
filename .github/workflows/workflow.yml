name: CI

env:
  GO_VERSION: "1.26.x"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Vet and test
        run: |
          go vet ./...
          go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build cross-platform binaries
        shell: bash
        run: |
          mkdir -p dist
          targets=(
            linux/amd64 linux/arm64
            darwin/amd64 darwin/arm64
            windows/amd64 windows/arm64
            freebsd/amd64 freebsd/arm64
            openbsd/amd64 openbsd/arm64
            netbsd/amd64 netbsd/arm64
            dragonfly/amd64
          )
          for target in "${targets[@]}"; do
            IFS=/ read -r goos goarch <<< "$target"
            extension=""
            if [ "$goos" = "windows" ]; then
              extension=".exe"
            fi
            output="dist/conoha-dns-${goos}-${goarch}${extension}"
            echo "Building ${output}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags='-s -w' -o "$output" ./cmd/conoha-dns
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: conoha-dns-binaries
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: conoha-dns-binaries
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes --verify-tag
